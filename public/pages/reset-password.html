<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cambiar contraseña · SIS-L</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/login.css"/>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🤟</span>
    <span class="logo-text"><span>LSC</span>-C</span>
  </div>
  <h2 id="cardTitle">Nueva contraseña</h2>
  <p class="subtitle" id="cardSub">Establece una nueva contraseña para tu cuenta.</p>
  
  <div class="error-msg"   id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div class="form-section active" id="sec-reset">
    <div class="form-group">
      <label>Nueva contraseña</label>
      <input type="password" id="resetPass" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="resetPassConfirm" placeholder="Repite tu contraseña" autocomplete="new-password"/>
    </div>
    <button class="btn" id="btnResetear" onclick="doResetearContraseña()">Cambiar contraseña →</button>
    <button type="button" class="btn-secondary" style="margin-top: 10px; width: 100%;" onclick="irAlLogin()">Volver al login</button>
  </div>

  <!-- Estado: token expirado o inválido -->
  <div class="form-section" id="sec-error">
    <div style="text-align: center;">
      <p style="color: #FF6363; margin-bottom: 20px;">
        <strong>⚠️ Link inválido o expirado</strong>
      </p>
      <p style="color: #888; margin-bottom: 20px;">
        El link de recuperación ya no es válido. Solicita uno nuevo en el login.
      </p>
      <button class="btn" onclick="irAlLogin()">Ir a login</button>
    </div>
  </div>
</div>

<script>
  // ── Mostrar / ocultar mensajes ────────────────────────
  function showError(msg) {
    const e = document.getElementById('errorMsg');
    e.textContent = msg;
    e.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const s = document.getElementById('successMsg');
    s.textContent = msg;
    s.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('errorMsg').style.display   = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  // ── Ir al login ────────────────────────────────────────
  function irAlLogin() {
    window.location.href = '/pages/login.html';
  }

  // ── Obtener token de la URL ────────────────────────────
  function getTokenFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
  }

  // ── Resetear contraseña ────────────────────────────────
  async function doResetearContraseña() {
    const token = getTokenFromURL();
    if (!token) {
      return showError('Token no encontrado. El link es inválido.');
    }

    const pass = document.getElementById('resetPass').value;
    const passConfirm = document.getElementById('resetPassConfirm').value;

    if (!pass || !passConfirm) {
      return showError('Completa todos los campos');
    }

    if (pass.length < 6) {
      return showError('La contraseña debe tener mínimo 6 caracteres');
    }

    if (pass !== passConfirm) {
      return showError('Las contraseñas no coinciden');
    }

    const btn = document.getElementById('btnResetear');
    btn.disabled = true;
    btn.textContent = 'Actualizando…';

    try {
      console.log('Enviando request a /api/auth/resetear-contraseña');
      console.log('Token:', token);
      
      const response = await fetch('/api/auth/resetear-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, nuevaContrasena: pass })
      });

      console.log('Response status:', response.status);
      const data = await response.json();
      console.log('Response data:', data);

      btn.disabled = false;
      btn.textContent = 'Cambiar contraseña →';

      if (!data || !data.ok) {
        return showError(data?.error || 'Error al cambiar contraseña');
      }

      showSuccess('¡Contraseña actualizada! Redirigiendo al login…');
      setTimeout(() => irAlLogin(), 2000);

    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Cambiar contraseña →';
      console.error('Error completo:', e);
      console.error('Stack:', e.stack);
      showError('Error de conexión: ' + e.message);
    }
  }

  // ── Validar token al cargar la página ───────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const token = getTokenFromURL();
    if (!token) {
      document.getElementById('sec-reset').style.display = 'none';
      document.getElementById('sec-error').style.display = 'block';
    }
  });
</script>
</body>
</html>
