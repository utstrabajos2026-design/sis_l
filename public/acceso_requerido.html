<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso Requerido - SIS-L</title>

  <style>

    /* =========================
       PALETA DEL DISEÑO
       ========================= */

    :root{
      --bg:#020617;
      --bg-secondary:#06111f;
      --card:#071221;
      --green:#59F8B2;
      --green-soft:#38d39f;
      --white:#F2F5FF;
      --gray:#94A3B8;
      --border:rgba(255,255,255,0.06);
      --shadow:rgba(89,248,178,0.25);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      background:
      radial-gradient(circle at top right, rgba(89,248,178,0.08), transparent 30%),
      radial-gradient(circle at bottom left, rgba(89,248,178,0.05), transparent 35%),
      linear-gradient(135deg,var(--bg),var(--bg-secondary));
      color:var(--white);
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    /* =========================
       FONDO ANIMADO
       ========================= */

    .glow{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.5;
      animation:float 10s infinite ease-in-out;
    }

    .g1{
      width:350px;
      height:350px;
      background:rgba(89,248,178,.08);
      top:-100px;
      right:-80px;
    }

    .g2{
      width:280px;
      height:280px;
      background:rgba(89,248,178,.05);
      bottom:-80px;
      left:-50px;
      animation-delay:2s;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-20px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    /* =========================
       CARD PRINCIPAL
       ========================= */

    .container{
      position:relative;
      width:90%;
      max-width:1100px;
      min-height:620px;
      border-radius:30px;
      background:rgba(3,10,20,0.85);
      border:1px solid var(--border);
      backdrop-filter:blur(16px);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:60px;
      z-index:2;
      box-shadow:
      0 0 0 1px rgba(255,255,255,0.02),
      0 30px 80px rgba(0,0,0,.6);
    }

    /* =========================
       LADO IZQUIERDO
       ========================= */

    .left{
      width:52%;
      z-index:2;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 18px;
      border-radius:40px;
      background:rgba(89,248,178,.08);
      border:1px solid rgba(89,248,178,.15);
      color:var(--green);
      margin-bottom:30px;
      font-size:.9rem;
      letter-spacing:1px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 10px var(--green);
    }

    h1{
      font-size:5rem;
      line-height:.95;
      font-weight:900;
      letter-spacing:-3px;
      margin-bottom:30px;
    }

    h1 span{
      color:var(--green);
      text-shadow:0 0 20px rgba(89,248,178,.35);
    }

    p{
      max-width:520px;
      color:var(--gray);
      font-size:1.08rem;
      line-height:1.8;
      margin-bottom:40px;
    }

    /* =========================
       BOTONES
       ========================= */

    .buttons{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      cursor:pointer;
      transition:.3s ease;
      font-weight:700;
      font-size:1rem;
    }

    .login-btn{
      background:var(--green);
      color:#041018;
      padding:18px 34px;
      border-radius:18px;
      box-shadow:0 0 30px rgba(89,248,178,.25);
    }

    .login-btn:hover{
      transform:translateY(-5px);
      box-shadow:0 0 40px rgba(89,248,178,.4);
    }

    .back-btn{
      background:transparent;
      border:1px solid rgba(255,255,255,.08);
      color:white;
      padding:18px 28px;
      border-radius:18px;
    }

    .back-btn:hover{
      background:rgba(255,255,255,.04);
      transform:translateY(-5px);
    }

    /* =========================
       LADO DERECHO
       ========================= */

    .right{
      width:40%;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    .circle{
      width:380px;
      height:380px;
      border-radius:50%;
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      border:1px solid rgba(89,248,178,.08);
      animation:rotate 18s linear infinite;
    }

    .circle::before{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      border-radius:50%;
      border:1px solid rgba(89,248,178,.05);
    }

    .circle::after{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle,
      rgba(89,248,178,.08),
      transparent 70%);
    }

    @keyframes rotate{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    .main-icon{
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(10,20,35,.95);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:90px;
      box-shadow:
      inset 0 0 30px rgba(89,248,178,.05),
      0 0 50px rgba(0,0,0,.5);
      z-index:3;
      animation:pulse 3s infinite ease-in-out;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.05);
      }
      100%{
        transform:scale(1);
      }
    }

    .mini{
      position:absolute;
      width:58px;
      height:58px;
      border-radius:50%;
      background:#081321;
      border:1px solid rgba(255,255,255,.04);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      box-shadow:0 0 25px rgba(0,0,0,.35);
    }

    .m1{ top:0; }
    .m2{ bottom:0; }
    .m3{ left:0; }
    .m4{ right:0; }

    /* =========================
       RESPONSIVE
       ========================= */

    @media(max-width:980px){

      body{
        overflow:auto;
      }

      .container{
        flex-direction:column;
        text-align:center;
        padding:50px 30px;
        gap:60px;
      }

      .left,
      .right{
        width:100%;
      }

      h1{
        font-size:3.8rem;
      }

      p{
        margin:auto;
        margin-bottom:40px;
      }

      .buttons{
        justify-content:center;
      }

      .circle{
        width:300px;
        height:300px;
      }

      .main-icon{
        width:150px;
        height:150px;
        font-size:70px;
      }

    }

    @media(max-width:600px){

      h1{
        font-size:2.8rem;
      }

      .circle{
        width:240px;
        height:240px;
      }

      .main-icon{
        width:120px;
        height:120px;
        font-size:55px;
      }

      .mini{
        width:48px;
        height:48px;
        font-size:20px;
      }

    }

  </style>
</head>

<body>

  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <div class="container">

    <!-- IZQUIERDA -->

    <div class="left">

      <div class="tag">
        <div class="dot"></div>
        SISTEMA DE APRENDIZAJE LSC
      </div>

      <h1>
        No puedes <br>
        acceder <br>
        <span>sin ingresar</span>
      </h1>

      <p>
        Para acceder a las lecciones, prácticas interactivas,
        quizzes y herramientas de Lengua de Señas Colombiana,
        primero debes iniciar sesión en la plataforma.
      </p>

      <div class="buttons">

        <button class="login-btn" onclick="goLogin()">
          Ingresar →
        </button>

        <button class="back-btn" onclick="goBack()">
          Volver
        </button>

      </div>

    </div>

    <!-- DERECHA -->

    <div class="right">

      <div class="circle">

        <div class="mini m1">👋</div>
        <div class="mini m2">🤟</div>
        <div class="mini m3">👌</div>
        <div class="mini m4">☝️</div>

      </div>

      <div class="main-icon">
        🤝
      </div>

    </div>

  </div>

  <script>

    function goLogin(){
      // Detectar si estamos en la carpeta pages/ o en la raíz
      const enPages = window.location.pathname.includes('/pages/');
      const prefix = enPages ? '..' : '.';
      window.location.href = prefix + '/pages/login.html';
    }

    function goBack(){
      history.back();
    }

    // EFECTO 3D

    const container = document.querySelector(".container");

    document.addEventListener("mousemove", (e) => {

      const x = (window.innerWidth / 2 - e.pageX) / 45;
      const y = (window.innerHeight / 2 - e.pageY) / 45;

      container.style.transform = `
        rotateY(${x}deg)
        rotateX(${-y}deg)
      `;

    });

    document.addEventListener("mouseleave", () => {

      container.style.transform = `
        rotateY(0deg)
        rotateX(0deg)
      `;

    });

  </script>

</body>
</html>
